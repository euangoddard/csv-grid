<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#2563eb"/>

  <!-- Spreadsheet grid -->
  <!-- Header row -->
  <rect x="72" y="96" width="368" height="68" rx="0" fill="#1d4ed8"/>

  <!-- Grid body background -->
  <rect x="72" y="164" width="368" height="252" fill="white" fill-opacity="0.08"/>

  <!-- Alternating row shading -->
  <rect x="72" y="214" width="368" height="50" fill="white" fill-opacity="0.06"/>
  <rect x="72" y="314" width="368" height="50" fill="white" fill-opacity="0.06"/>

  <!-- Column dividers -->
  <line x1="72" y1="96" x2="72" y2="416" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="200" y1="96" x2="200" y2="416" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="328" y1="96" x2="328" y2="416" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="440" y1="96" x2="440" y2="416" stroke="white" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Row dividers -->
  <line x1="72" y1="96"  x2="440" y2="96"  stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="72" y1="164" x2="440" y2="164" stroke="white" stroke-opacity="0.2"  stroke-width="2"/>
  <line x1="72" y1="214" x2="440" y2="214" stroke="white" stroke-opacity="0.1"  stroke-width="1.5"/>
  <line x1="72" y1="264" x2="440" y2="264" stroke="white" stroke-opacity="0.1"  stroke-width="1.5"/>
  <line x1="72" y1="314" x2="440" y2="314" stroke="white" stroke-opacity="0.1"  stroke-width="1.5"/>
  <line x1="72" y1="364" x2="440" y2="364" stroke="white" stroke-opacity="0.1"  stroke-width="1.5"/>
  <line x1="72" y1="416" x2="440" y2="416" stroke="white" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Header labels -->
  <text x="136" y="143" text-anchor="middle" font-family="ui-monospace,monospace" font-size="34" font-weight="700" fill="white" opacity="0.9">A</text>
  <text x="264" y="143" text-anchor="middle" font-family="ui-monospace,monospace" font-size="34" font-weight="700" fill="white" opacity="0.6">B</text>
  <text x="384" y="143" text-anchor="middle" font-family="ui-monospace,monospace" font-size="34" font-weight="700" fill="white" opacity="0.6">C</text>

  <!-- Row 1 data bars -->
  <rect x="88"  y="183" width="92"  height="12" rx="6" fill="white" opacity="0.75"/>
  <rect x="216" y="183" width="72"  height="12" rx="6" fill="white" opacity="0.45"/>
  <rect x="344" y="183" width="56"  height="12" rx="6" fill="white" opacity="0.45"/>

  <!-- Row 2 data bars -->
  <rect x="88"  y="233" width="72"  height="12" rx="6" fill="white" opacity="0.75"/>
  <rect x="216" y="233" width="96"  height="12" rx="6" fill="white" opacity="0.45"/>
  <rect x="344" y="233" width="80"  height="12" rx="6" fill="white" opacity="0.45"/>

  <!-- Row 3 data bars -->
  <rect x="88"  y="283" width="108" height="12" rx="6" fill="white" opacity="0.75"/>
  <rect x="216" y="283" width="60"  height="12" rx="6" fill="white" opacity="0.45"/>
  <rect x="344" y="283" width="88"  height="12" rx="6" fill="white" opacity="0.45"/>

  <!-- Row 4 data bars -->
  <rect x="88"  y="333" width="80"  height="12" rx="6" fill="white" opacity="0.75"/>
  <rect x="216" y="333" width="100" height="12" rx="6" fill="white" opacity="0.45"/>
  <rect x="344" y="333" width="64"  height="12" rx="6" fill="white" opacity="0.45"/>

  <!-- Row 5 data bars -->
  <rect x="88"  y="383" width="96"  height="12" rx="6" fill="white" opacity="0.75"/>
  <rect x="216" y="383" width="76"  height="12" rx="6" fill="white" opacity="0.45"/>
  <rect x="344" y="383" width="72"  height="12" rx="6" fill="white" opacity="0.45"/>
</svg>
