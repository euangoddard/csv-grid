<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable icon -->
  <rect width="512" height="512" fill="#2563eb"/>

  <!-- Slightly scaled-down grid to stay within maskable safe zone (inner 80%) -->
  <!-- Header row -->
  <rect x="104" y="120" width="304" height="56" fill="#1d4ed8"/>

  <!-- Grid body background -->
  <rect x="104" y="176" width="304" height="216" fill="white" fill-opacity="0.08"/>

  <!-- Alternating row shading -->
  <rect x="104" y="220" width="304" height="43" fill="white" fill-opacity="0.06"/>
  <rect x="104" y="306" width="304" height="43" fill="white" fill-opacity="0.06"/>

  <!-- Column dividers -->
  <line x1="104" y1="120" x2="104" y2="392" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="207" y1="120" x2="207" y2="392" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="310" y1="120" x2="310" y2="392" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="408" y1="120" x2="408" y2="392" stroke="white" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Row dividers -->
  <line x1="104" y1="120" x2="408" y2="120" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="104" y1="176" x2="408" y2="176" stroke="white" stroke-opacity="0.2"  stroke-width="2"/>
  <line x1="104" y1="220" x2="408" y2="220" stroke="white" stroke-opacity="0.1"  stroke-width="1.5"/>
  <line x1="104" y1="263" x2="408" y2="263" stroke="white" stroke-opacity="0.1"  stroke-width="1.5"/>
  <line x1="104" y1="306" x2="408" y2="306" stroke="white" stroke-opacity="0.1"  stroke-width="1.5"/>
  <line x1="104" y1="349" x2="408" y2="349" stroke="white" stroke-opacity="0.1"  stroke-width="1.5"/>
  <line x1="104" y1="392" x2="408" y2="392" stroke="white" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Header labels -->
  <text x="155" y="161" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="700" fill="white" opacity="0.9">A</text>
  <text x="258" y="161" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="700" fill="white" opacity="0.6">B</text>
  <text x="358" y="161" text-anchor="middle" font-family="ui-monospace,monospace" font-size="28" font-weight="700" fill="white" opacity="0.6">C</text>

  <!-- Row 1 -->
  <rect x="116" y="193" width="76"  height="10" rx="5" fill="white" opacity="0.75"/>
  <rect x="220" y="193" width="58"  height="10" rx="5" fill="white" opacity="0.45"/>
  <rect x="322" y="193" width="46"  height="10" rx="5" fill="white" opacity="0.45"/>

  <!-- Row 2 -->
  <rect x="116" y="236" width="58"  height="10" rx="5" fill="white" opacity="0.75"/>
  <rect x="220" y="236" width="78"  height="10" rx="5" fill="white" opacity="0.45"/>
  <rect x="322" y="236" width="64"  height="10" rx="5" fill="white" opacity="0.45"/>

  <!-- Row 3 -->
  <rect x="116" y="279" width="88"  height="10" rx="5" fill="white" opacity="0.75"/>
  <rect x="220" y="279" width="48"  height="10" rx="5" fill="white" opacity="0.45"/>
  <rect x="322" y="279" width="72"  height="10" rx="5" fill="white" opacity="0.45"/>

  <!-- Row 4 -->
  <rect x="116" y="322" width="66"  height="10" rx="5" fill="white" opacity="0.75"/>
  <rect x="220" y="322" width="82"  height="10" rx="5" fill="white" opacity="0.45"/>
  <rect x="322" y="322" width="52"  height="10" rx="5" fill="white" opacity="0.45"/>

  <!-- Row 5 -->
  <rect x="116" y="365" width="78"  height="10" rx="5" fill="white" opacity="0.75"/>
  <rect x="220" y="365" width="62"  height="10" rx="5" fill="white" opacity="0.45"/>
  <rect x="322" y="365" width="58"  height="10" rx="5" fill="white" opacity="0.45"/>
</svg>
